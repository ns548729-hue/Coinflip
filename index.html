<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Analytics - Admin Controlled</title>
    <style>
        /* 🎨 THEME & BASE STYLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 💳 WALLET HEADER */
        .header {
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: #161b22;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }

        .wallet {
            color: #58a6ff;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .header-btns {
            display: flex;
            gap: 8px;
        }

        .btn-add { background-color: #238636; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-withdraw { background-color: #da3637; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-admin-nav { background-color: #8b949e; color: black; border: none; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }

        /* 🎮 GAME INTERFACE */
        .game-container {
            width: 100%;
            max-width: 360px;
            background: #161b22;
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .coin-box { perspective: 1000px; margin: 20px auto 35px auto; width: 110px; height: 110px; }
        .coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1.2s ease-out; }
        .coin-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; border: 5px solid #00ff66; box-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }
        .heads { background: linear-gradient(45deg, #1f4037, #99f2c8); color: #0d1117; }
        .tails { background: linear-gradient(45deg, #ffd700, #b8860b); color: #0d1117; transform: rotateY(180deg); border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        .bet-input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; width: 85%; text-align: center; font-size: 1.2rem; margin-bottom: 15px; }
        .action-btns { display: flex; gap: 15px; justify-content: center; }
        .btn-choice { flex: 1; padding: 12px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn-head { background-color: #00ff66; color: #0d1117; }
        .btn-tail { background-color: #ffd700; color: #0d1117; }
        .btn-choice:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 📊 RECENT HISTORY TRENDS */
        .history-box { width: 100%; max-width: 360px; margin-top: 20px; background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .history-title { font-size: 0.85rem; color: #8b949e; margin-bottom: 10px; }
        .history-list { display: flex; gap: 8px; justify-content: center; }
        .history-item { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; }

        /* 🔳 POPUP MODAL SYSTEM */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 16px; width: 90%; max-width: 340px; text-align: center; border: 1px solid #30363d; }
        .qr-img { width: 180px; height: 180px; margin: 15px 0; border-radius: 12px; border: 4px solid #ffffff; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 8px; text-align: center; }
        .btn-submit { background-color: #00ff66; color: #0d1117; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-close { background: #30363d; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; }

        /* 🛠️ ADMIN PANEL STYLES */
        .admin-section { display: none; width: 100%; max-width: 360px; background: #1c2128; border: 2px dashed #58a6ff; border-radius: 16px; margin-top: 25px; padding: 20px; }
        .admin-title { color: #58a6ff; font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; text-align: center; }
        .admin-card { background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem; }
        .admin-btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .btn-approve { background: #238636; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-reject { background: #da3637; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .select-mode { width: 100%; padding: 10px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- WALLET HEADER -->
    <div class="header">
        <div class="wallet" id="wallet-display">Wallet: ₹100</div>
        <div class="header-btns">
            <button class="btn-add" onclick="toggleModal('qr-modal', true)">Add</button>
            <button class="btn-withdraw" onclick="toggleModal('withdraw-modal', true)">Withdraw</button>
            <button class="btn-admin-nav" onclick="openAdminPanel()">⚙️</button>
        </div>
    </div>

    <!-- MAIN GAME AREA -->
    <div class="game-container">
        <div class="coin-box">
            <div class="coin" id="coin-element">
                <div class="coin-face heads">H</div>
                <div class="coin-face tails">T</div>
            </div>
        </div>

        <div class="bet-section">
            <input type="number" id="bet-amount" class="bet-input" value="10" min="1" placeholder="Bet Amount (₹)">
            <div class="action-btns">
                <button class="btn-choice btn-head" onclick="playGame('H')">HEAD</button>
                <button class="btn-choice btn-tail" onclick="playGame('T')">TAIL</button>
            </div>
        </div>
        <div id="status-msg" style="font-weight: bold; min-height: 24px; color: #8b949e; margin-top: 15px;">Apni bet lagayein!</div>
    </div>

    <!-- RECENT TRENDS -->
    <div class="history-box">
        <div class="history-title">Recent Trends (Pichle Results)</div>
        <div class="history-list" id="history-container"></div>
    </div>

    <!-- DYNAMIC CONTROLLED ADMIN PANEL -->
    <div class="admin-section" id="admin-panel">
        <div class="admin-title">🛠️ Admin Control Panel</div>
        
        <label style="font-size: 0.85rem; color: #8b949e;">Game Mode Control:</label>
        <select class="select-mode" id="game-mode" onchange="changeGameMode()">
            <option value="random">Random (50-50 Real Luck)</option>
            <option value="force-head">Always HEAD (User Wins on Head, Loses on Tail)</option>
            <option value="force-tail">Always TAIL (User Wins on Tail, Loses on Head)</option>
            <option value="always-lose">User Always Lose (Kuch bhi chune haar jaye)</option>
        </select>

        <h4 style="color: #58a6ff; font-size: 0.95rem; margin-bottom: 8px;">Pending Deposits</h4>
        <div id="admin-deposits-list"><p style='color:#8b949e; font-size:0.85rem;'>Koi request nahi hai.</p></div>

        <h4 style="color: #da3637; font-size: 0.95rem; margin-top: 15px; margin-bottom: 8px;">Pending Withdrawals</h4>
        <div id="admin-withdrawals-list"><p style='color:#8b949e; font-size:0.85rem;'>Koi request nahi hai.</p></div>
    </div>

    <!-- POPUP MODALS (DEPOSIT & WITHDRAW) -->
    <div class="modal" id="qr-modal">
        <div class="modal-content">
            <h3 style="color: #00ff66;">Scan Barcode to Pay</h3>
            <img src="my_qr.png" alt="My UPI Barcode" class="qr-img">
            <input type="number" id="deposit-amount" class="modal-input" placeholder="Kitne paise bheje? (₹)">
            <input type="text" id="utr-number" class="modal-input" placeholder="Enter UTR / Ref No.">
            <button class="btn-submit" onclick="submitDeposit()">Submit Request</button>
            <button class="btn-close" onclick="toggleModal('qr-modal', false)">Cancel</button>
        </div>
    </div>

    <div class="modal" id="withdraw-modal">
        <div class="modal-content">
            <h3 style="color: #da3637;">Withdraw Money</h3>
            <input type="number" id="withdraw-amount" class="modal-input" placeholder="Amount nikalne ke liye (₹)">
            <input type="text" id="upi-id" class="modal-input" placeholder="Enter UPI ID">
            <button class="btn-submit" style="background-color: #da3637; color: white;" onclick="submitWithdraw()">Submit Withdrawal</button>
            <button class="btn-close" onclick="toggleModal('withdraw-modal', false)">Cancel</button>
        </div>
    </div>

    <!-- 🧠 JAVASCRIPT GAME & ADMIN LOGIC -->
    <script>
        let balance = parseInt(localStorage.getItem('my_wallet_balance')) || 100;
        let history = JSON.parse(localStorage.getItem('game_history')) || [];
        let deposits = JSON.parse(localStorage.getItem('admin_deposits')) || [];
        let withdrawals = JSON.parse(localStorage.getItem('admin_withdrawals')) || [];
        let gameMode = localStorage.getItem('admin_game_mode') || 'random';
        let currentRotation = 0;

        const walletDisplay = document.getElementById('wallet-display');
        const coinElement = document.getElementById('coin-element');
        const statusMsg = document.getElementById('status-msg');
        const historyContainer = document.getElementById('history-container');
        const betButtons = document.querySelectorAll('.btn-choice');

        function updateUI() {
            walletDisplay.innerText = `Wallet: ₹${balance}`;
            localStorage.setItem('my_wallet_balance', balance);
            
            historyContainer.innerHTML = '';
            history.slice(-5).reverse().forEach(res => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.style.backgroundColor = res === 'H' ? '#00ff66' : '#ffd700';
                item.style.color = '#0d1117';
                item.innerText = res;
                historyContainer.appendChild(item);
            });
            localStorage.setItem('game_history', JSON.stringify(history));
            renderAdminLists();
        }

        function toggleModal(modalId, show) {
            document.getElementById(modalId).style.display = show ? 'flex' : 'none';
        }

        // SECRET PASSWORD ENTRY
        function openAdminPanel() {
            const pass = prompt("Admin Secret Password Dalein:");
            if(pass === "1234") { // <--- AAPKA PASSWORD
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('game-mode').value = gameMode;
                alert("Admin Access Granted!");
                window.scrollTo(0, document.body.scrollHeight);
            } else {
                alert("Galat Password! Access Denied.");
            }
        }

        function changeGameMode() {
            gameMode = document.getElementById('game-mode').value;
            localStorage.setItem('admin_game_mode', gameMode);
        }

        // DEPOSIT & WITHDRAW REQUEST HANDLING
        function submitDeposit() {
            const amount = document.getElementById('deposit-amount').value;
            const utr = document.getElementById('utr-number').value;
            if(!amount || !utr) return alert("Dono detail bharein!");

            deposits.push({ id: Date.now(), amount: parseInt(amount), utr: utr });
            localStorage.setItem('admin_deposits', JSON.stringify(deposits));
            alert("Request sent to Admin successfully!");
            toggleModal('qr-modal', false);
            updateUI();
        }

        function submitWithdraw() {
            const amount = parseInt(document.getElementById('withdraw-amount').value);
            const upi = document.getElementById('upi-id').value;
            if(!amount || !upi) return alert("Dono detail bharein!");
            if(amount > balance) return alert("Paryapt balance nahi hai!");

            balance -= amount;
            withdrawals.push({ id: Date.now(), amount: amount, upi: upi });
            localStorage.setItem('admin_withdrawals', JSON.stringify(withdrawals));
            alert("Withdrawal request sent!");
            toggleModal('withdraw-modal', false);
            updateUI();
        }

        // ADMIN BUTTON ACTIONS
        function actionDeposit(id, approve) {
            let req = deposits.find(d => d.id === id);
            if(approve && req) balance += req.amount;
            deposits = deposits.filter(d => d.id !== id);
            localStorage.setItem('admin_deposits', JSON.stringify(deposits));
            updateUI();
        }

        function actionWithdraw(id, approve) {
            let req = withdrawals.find(w => w.id === id);
            if(!approve && req) balance += req.amount; // Reject karne par user ko refund
            withdrawals = withdrawals.filter(w => w.id !== id);
            localStorage.setItem('admin_withdrawals', JSON.stringify(withdrawals));
            updateUI();
        }

        function renderAdminLists() {
            const depList = document.getElementById('admin-deposits-list');
            const witList = document.getElementById('admin-withdrawals-list');
            
            if(deposits.length === 0) depList.innerHTML = "<p style='color:#8b949e; font-size:0.85rem;'>Koi request nahi hai.</p>";
            else {
                depList.innerHTML = '';
                deposits.forEach(d => {
                    depList.innerHTML += `<div class="admin-card">Amt: ₹${d.amount} | UTR: ${d.utr}
                        <div class="admin-btn-group">
                            <button class="btn-approve" onclick="actionDeposit(${d.id}, true)">Approve</button>
                            <button class="btn-reject" onclick="actionDeposit(${d.id}, false)">Reject</button>
                        </div></div>`;
                });
            }

            if(withdrawals.length === 0) witList.innerHTML = "<p style='color:#8b949e; font-size:0.85rem;'>Koi request nahi hai.</p>";
            else {
                witList.innerHTML = '';
                withdrawals.forEach(w => {
                    witList.innerHTML += `<div class="admin-card">Amt: ₹${w.amount} | UPI: ${w.upi}
                        <div class="admin-btn-group">
                            <button class="btn-approve" onclick="actionWithdraw(${w.id}, true)">Paid</button>
                            <button class="btn-reject" onclick="actionWithdraw(${w.id}, false)">Reject</button>
                        </div></div>`;
                });
            }
        }

        // CONTROLLED GAMEPLAY LOGIC
        function playGame(playerChoice) {
            const betAmount = parseInt(document.getElementById('bet-amount').value);
            if (isNaN(betAmount) || betAmount <= 0 || betAmount > balance) return alert("Check balance/bet amount!");

            betButtons.forEach(btn => btn.disabled = true);
            statusMsg.innerText = "Coin ghoom raha hai...";
            statusMsg.style.color = "#8b949e";
            
            let isHead;
            if (gameMode === 'force-head') isHead = true;
            else if (gameMode === 'force-tail') isHead = false;
            else if (gameMode === 'always-lose') isHead = (playerChoice !== 'H');
            else isHead = Math.random() < 0.5; // Random Mode

            currentRotation += 1440 + (isHead ? 0 : 180); 
            coinElement.style.transform = `rotateY(${currentRotation}deg)`;

            setTimeout(() => {
                const finalResult = isHead ? 'H' : 'T';
                if (playerChoice === finalResult) {
                    balance += betAmount;
                    statusMsg.innerText = `🎉 Jeet Gaye! Result ${finalResult==='H'?'Head':'Tail'} aaya.`;
                    statusMsg.style.color = '#00ff66';
                } else {
                    balance -= betAmount;
                    statusMsg.innerText = `❌ Haar Gaye! Result ${finalResult==='H'?'Head':'Tail'} aaya.`;
                    statusMsg.style.color = '#da3637';
                }
                history.push(finalResult);
                if(history.length > 10) history.shift();
                updateUI();
                betButtons.forEach(btn => btn.disabled = false);
            }, 1200);
        }

        updateUI();
    </script>
</body>
</html>
