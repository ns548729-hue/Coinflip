<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip Game</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
        }
        .coin-container {
            margin: 50px auto;
            width: 150px;
            height: 150px;
            perspective: 1000px;
        }
        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 3s ease-out;
        }
        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .heads {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            color: #000;
        }
        .tails {
            background: linear-gradient(45deg, #c0c0c0, #808080);
            color: #fff;
            transform: rotateY(180deg);
        }
        button {
            background: #6200ee;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 20px; color: #03dac6; }
    </style>
</head>
<body>

    <h1>Coin Flip</h1>
    
    <div class="coin-container">
        <div class="coin" id="coin">
            <div class="side heads">HEADS</div>
            <div class="side tails">TAILS</div>
        </div>
    </div>

    <button id="flipBtn">Flip Coin</button>
    <div id="status">Waiting for flip...</div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIdaSyBNMb-pZCrgEN4-b8rmU5d",
            authDomain: "coinflip-game-703d0.firebaseapp.com",
            projectId: "coinflip-game-703d0",
            storageBucket: "coinflip-game-703d0.appspot.com",
            messagingSenderId: "393705116749",
            appId: "1:393705116749:web:11321389e",
            databaseURL: "https://coinflip-game-703d0-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'gameState');

        const coin = document.getElementById('coin');
        const flipBtn = document.getElementById('flipBtn');
        const status = document.getElementById('status');

        let nextResult = "Heads"; 

        // Live Admin Result Listen karein
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.nextResult) {
                nextResult = data.nextResult;
            }
        });

        flipBtn.addEventListener('click', () => {
            flipBtn.disabled = true;
            status.innerText = "Flipping...";
            
            // Random extra rotations for animation
            const extraDegrees = Math.floor(Math.random() * 5) + 5; 
            const finalRotation = nextResult === "Heads" ? (extraDegrees * 360) : (extraDegrees * 360 + 180);
            
            coin.style.transform = `rotateY(${finalRotation}deg)`;

            setTimeout(() => {
                status.innerText = `Result is: ${nextResult.toUpperCase()}!`;
                flipBtn.disabled = false;
            }, 3000);
        });
    </script>
</body>
</html>
